<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOO:DROP</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --point-color: #b3e5fc; /* 연하늘색 */
            --my-bubble: #b3e5fc;
            --other-bubble: #1c1c1e;
            --border-color: #e5e5ea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 356px;
        }

        /* 스마트폰 프레임 내부 고정 크기 */
        #app {
            width: 390px;
            height: 844px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
        }

        .screen.active {
            display: flex;
        }

        /* 공통 헤더 스타일 */
        .screen-header {
            padding: 60px 20px 15px 20px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main);
            background: var(--bg-color);
            border-bottom: 1px solid transparent;
        }

        /* 하단 탭 바 (상단 양쪽 둥글게 + 그림자) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: #ffffff;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            z-index: 10;
        }

        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            height: 100%;
        }

        .nav-item svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2px;
            transition: stroke 0.2s;
        }

        .nav-item.active svg {
            stroke: var(--point-color);
            fill: rgba(179, 229, 252, 0.2);
        }

        /* 1. 인트로 스크린 */
        #screen-intro {
            justify-content: space-between;
            padding: 100px 30px 60px 30px;
            text-align: center;
        }

        .intro-top h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .intro-top p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .intro-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-black {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-black:active {
            opacity: 0.8;
        }

        /* 로그인 / 회원가입 폼 양식 */
        .form-screen {
            padding: 60px 24px;
        }
        .form-header {
            margin-bottom: 40px;
        }
        .form-header h2 { font-size: 28px; font-weight: 700; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            font-size: 15px;
            outline: none;
        }
        .back-text-btn {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
        }

        /* 스크롤 컨테이너 */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 100px 20px;
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        /* 소제목 */
        .section-title {
            font-size: 13px;
            color: var(--text-muted);
            margin: 15px 0 8px 0;
            font-weight: 500;
        }

        /* 리스트 아이템 컴포넌트 */
        .profile-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .profile-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin-right: 14px;
            background-color: #e1e1e1;
            flex-shrink: 0;
        }
        .profile-info {
            flex: 1;
            overflow: hidden;
        }
        .profile-info .name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px;
        }
        .profile-info .sub {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 디테일 모달/화면 */
        .sub-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 20;
            display: none;
            flex-direction: column;
        }
        .sub-screen.active { display: flex; }

        /* 프로필 상세화면 */
        .profile-detail-bg {
            height: 45%;
            background-size: cover;
            background-position: center;
            background-color: #cbd5e1;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
        }
        .close-btn svg { width: 18px; height: 18px; stroke: #ffffff; stroke-width: 2.5px; }
        
        .profile-detail-body {
            flex: 1;
            position: relative;
            padding-top: 65px;
            text-align: center;
            background: var(--bg-color);
        }
        .profile-detail-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--bg-color);
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-size: cover;
            background-position: center;
            background-color: #e1e1e1;
        }
        .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .detail-status { font-size: 14px; color: var(--text-muted); padding: 0 30px; }
        .detail-action-space {
            position: absolute;
            bottom: 110px;
            left: 0;
            width: 100%;
            padding: 0 30px;
        }

        /* 채팅룸 관련 구조 */
        .chat-room-header {
            padding: 50px 15px 15px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
        }
        .chat-room-left { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
        .back-arrow { cursor: pointer; display: flex; align-items: center; }
        .back-arrow svg { width: 24px; height: 24px; stroke: var(--text-main); stroke-width: 2px; }
        .setting-icon-btn { cursor: pointer; display: flex; align-items: center; }
        .setting-icon-btn svg { width: 24px; height: 24px; stroke: var(--text-main); stroke-width: 2px; fill: none; }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f2f2f7;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-messages-area::-webkit-scrollbar { display: none; }

        /* 말풍선 배치 */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; gap: 8px; }

        .msg-bubble {
            max-width: 65%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-all;
        }
        .msg-row.me .msg-bubble {
            background-color: var(--my-bubble);
            color: #000000;
            border-top-right-radius: 4px;
        }
        .msg-row.other .msg-bubble {
            background-color: var(--other-bubble);
            color: #ffffff;
            border-top-left-radius: 4px;
        }
        .msg-other-content { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
        .msg-meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: flex-end; margin: 0 4px; }
        .msg-other-top { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* 채팅 전송바 규격화 */
        .chat-input-bar {
            padding: 10px 12px 30px 12px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .chat-cam-btn {
            width: 42px;
            height: 42px;
            background-color: #f2f2f7;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }
        .chat-cam-btn svg { width: 22px; height: 22px; fill: var(--text-muted); }
        .chat-text-input {
            flex: 1;
            height: 42px;
            background-color: #f2f2f7;
            border: none;
            border-radius: 20px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
        }
        .chat-send-btn {
            height: 42px;
            padding: 0 16px;
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* 그룹채팅 생성 전용 플로팅/상단 버튼 */
        .add-chat-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .btn-small-gray {
            background: #e5e5ea;
            border: none;
            padding: 8px 14px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 체크박스 리스트 */
        .check-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .check-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            cursor: pointer;
        }

        /* 설정창 항목 */
        .setting-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }
        .round-rect-btn {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 공지사항 아코디언 */
        .notice-item {
            background: #ffffff;
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .notice-title-bar {
            padding: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: #ffffff;
        }
        .notice-content {
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid var(--border-color);
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 그룹채팅 설정화면 전용 */
        .danger-text { color: #ff3b30 !important; font-weight: 700; }
    </style>
</head>
<body>

<div id="app">

    <!-- ========================================== -->
    <!-- 1. 로그인 & 회원가입 첫 화면 -->
    <!-- ========================================== -->
    <div id="screen-intro" class="screen active">
        <div class="intro-top">
            <h1 style="color: #000000; font-weight:900;">MOO:DROP</h1>
            <p>Mood with your friend,<br>Mood is right here.</p>
        </div>
        <div class="intro-buttons">
            <button class="btn-black" onclick="showScreen('screen-login')">로그인</button>
            <button class="btn-black" onclick="showScreen('screen-register')">회원가입</button>
        </div>
    </div>

    <!-- 1-2. 로그인 단독 스크린 -->
    <div id="screen-login" class="screen form-screen">
        <div class="form-header">
            <h2>로그인</h2>
        </div>
        <div class="form-group">
            <label>이메일 아이디</label>
            <input type="email" id="login-id" placeholder="example@mood.com" value="jse131121@mood.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" value="01024773752">
        </div>
        <button class="btn-black" style="margin-top: 20px;" onclick="handleLogin()">로그인 완료</button>
        <div class="back-text-btn" onclick="showScreen('screen-intro')">돌아가기</div>
    </div>

    <!-- 1-3. 회원가입 스크린 -->
    <div id="screen-register" class="screen form-screen">
        <div class="form-header">
            <h2>회원가입</h2>
        </div>
        <div class="form-group">
            <label>이메일 아이디</label>
            <input type="email" id="reg-id" placeholder="사용할 이메일을 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="reg-pw" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="form-group">
            <label>이름</label>
            <input type="text" id="reg-name" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label>생년월일 (YYYY-MM-DD)</label>
            <input type="text" id="reg-birth" placeholder="예: 2000-01-01">
        </div>
        <button class="btn-black" style="margin-top: 20px;" onclick="handleRegister()">가입 완료</button>
        <div class="back-text-btn" onclick="showScreen('screen-intro')">돌아가기</div>
    </div>


    <!-- ========================================== -->
    <!-- 메인 탭 화면들 (로그인 후 진입) -->
    <!-- ========================================== -->

    <!-- 2. 프로필 탭 -->
    <div id="tab-profile" class="screen">
        <div class="screen-header">PROFILE</div>
        <div class="scroll-content">
            <div class="section-title">내 프로필</div>
            <div id="my-profile-card"></div>
            
            <div class="section-title" style="margin-top: 25px;">내 친구</div>
            <div id="friend-list-container"></div>
        </div>
    </div>

    <!-- 3. 채팅 탭 -->
    <div id="tab-chat" class="screen">
        <div class="screen-header">CHAT</div>
        <div class="scroll-content">
            <div class="add-chat-row">
                <button class="btn-small-gray" onclick="openCreateChatModal()">+ 그룹 채팅 만들기</button>
            </div>
            <div id="chat-list-container"></div>
        </div>
    </div>

    <!-- 4. 그 외(Other) 탭 -->
    <div id="tab-other" class="screen">
        <div class="screen-header">OTHER</div>
        <div class="scroll-content">
            <div style="display:flex; flex-direction:column; align-items:center; margin: 20px 0 30px 0;">
                <div id="other-my-img" class="profile-img" style="width:80px; height:80px; margin-right:0; margin-bottom:12px;"></div>
                <div id="other-my-name" style="font-size:20px; font-weight:700;">이름</div>
            </div>

            <div class="setting-box-container">
                <button class="round-rect-btn" onclick="openSettingModal()">
                    <span>SETTING</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="round-rect-btn" onclick="openNoticeModal()">
                    <span>NOTICE</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="round-rect-btn" onclick="handleLogout()" style="border-color:#ff3b30; color:#ff3b30;">
                    <span>LOGOUT</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 고정 하단 탭 바 컨트롤 컴포넌트 -->
    <!-- ========================================== -->
    <div id="main-bottom-nav" class="bottom-nav" style="display: none;">
        <div class="nav-item active" id="nav-prof" onclick="switchTab('profile')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div class="nav-item" id="nav-oth" onclick="switchTab('other')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- 서브 스크린 및 모달 레이어 (오류 방지 독립식) -->
    <!-- ========================================== -->

    <!-- 프로필 상세 보기 창 -->
    <div id="sub-profile-detail" class="sub-screen">
        <div class="profile-detail-bg" id="detail-bg-img">
            <button class="close-btn" onclick="closeSubScreen('sub-profile-detail')">
                <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="profile-detail-body">
            <div class="profile-detail-img" id="detail-user-img"></div>
            <div class="detail-name" id="detail-user-name">이름</div>
            <div class="detail-status" id="detail-user-status">상태메세지 내용</div>
            <div class="detail-action-space">
                <button class="btn-black" id="detail-chat-turn-btn">채팅하러 가기</button>
            </div>
        </div>
    </div>

    <!-- 실제 실시간 대화방 내부 화면 -->
    <div id="sub-chat-room" class="sub-screen" style="background-color: #f2f2f7;">
        <div class="chat-room-header">
            <div class="chat-room-left">
                <div class="back-arrow" onclick="closeChatRoom()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6"/></svg></div>
                <span id="chat-room-title-text">채팅방</span>
            </div>
            <div class="setting-icon-btn" onclick="openChatRoomSetting()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
        </div>
        <div class="chat-messages-area" id="chat-msg-container"></div>
        <div class="chat-input-bar">
            <button class="chat-cam-btn" onclick="triggerDummyPhoto()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
            <input type="text" class="chat-text-input" id="chat-typing-field" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <!-- 그룹채팅 생성 모달 -->
    <div id="sub-create-chat" class="sub-screen form-screen">
        <div class="form-header"><h2>그룹채팅 생성</h2></div>
        <div class="form-group">
            <label>채팅방 이름</label>
            <input type="text" id="new-chat-title" placeholder="방 이름을 적어주세요">

        <div class="section-title">초대할 친구 선택</div>

        <button class="btn-black" onclick="submitCreateChat()">생성하기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-create-chat')">취소</div>

    <!-- 채팅방 설정 스크린 -->
    <div id="sub-chat-setting" class="sub-screen" style="padding: 60px 20px;">
        <div class="form-header"><h2>채팅방 설정</h2></div>
        <div class="form-group">
            <label>채팅방 이름 변경</label>
            <input type="text" id="edit-chatroom-title">
        </div>
        <div class="form-group">
            <label>채팅방 프로필 사진 이미지 URL</label>
            <input type="text" id="edit-chatroom-img" placeholder="이미지 주소를 입력하세요">
        </div>
        <button class="btn-black" style="padding:10px; margin-bottom:20px;" onclick="saveChatRoomSetting()">방 정보 수정 완료</button>
        
        <div class="section-title">참여중인 사람 목록</div>
        <div id="chatroom-member-list" style="max-height:200px; overflow-y:auto; margin-bottom:20px;"></div>
        
        <button class="round-rect-btn danger-text" onclick="leaveChatRoom()" style="justify-content:center; border-color:#ff3b30;">나가기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-chat-setting')">닫기</div>

    <!-- 개인 설정(SETTING) 모달 -->
    <div id="sub-my-setting" class="sub-screen form-screen">
        <div class="form-header"><h2>프로필 설정 변경</h2></div>
        <div class="form-group"><label>이름</label><input type="text" id="set-my-name"></div>
        <div class="form-group"><label>상태메세지</label><input type="text" id="set-my-status"></div>
        <div class="form-group"><label>프로필 사진 URL</label><input type="text" id="set-my-img" placeholder="이미지 URL 주소"></div>
        <div class="form-group"><label>배경 사진 URL</label><input type="text" id="set-my-bg" placeholder="이미지 URL 주소"></div>
        <button class="btn-black" onclick="saveMySetting()">저장하기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-my-setting')">취소</div>

        <div class="form-header" style="display:flex; justify-content:space-between; align-items:center;">
            <h2>공지사항</h2>
            <button class="btn-small-gray" id="admin-notice-write-btn" style="display:none;" onclick="toggleNoticeForm()">글쓰기</button>
        </div>
        <div id="admin-notice-form" style="display:none; background:#ffffff; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid var(--border-color);">
            <input type="text" id="new-notice-title" placeholder="공지 제목" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border-color);"><br>
            <textarea id="new-notice-content" placeholder="공지 내용" style="width:100%; height:80px; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border-color); resize:none;"></textarea>
            <button class="btn-black" style="padding:10px;" onclick="submitNotice()">등록</button>
        </div>
        <div id="notice-list-container" style="flex:1; overflow-y:auto;"></div>
        <div class="back-text-btn" onclick="closeSubScreen('sub-notice')">닫기</div>

</div>

<!-- ========================================== -->
<!-- 고강도 핵심 비즈니스 로직 스크립트 -->
<!-- ========================================== -->
<script>
    // 시스템 초기 핵심 프리셋 데이터 생성
    const fallbackUsers = [
        { id: "jse131121@mood.com", pw: "01024773752", name: "관리자마스터", birth: "1998-11-21", status: "MOO:DROP 시스템 총괄 관리자 모드", img: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150", bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" },
        { id: "friend1@mood.com", pw: "1234", name: "김하늘", birth: "2001-05-12", status: "오늘 날씨 완전 연하늘빛 가득!", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", bg: "https://images.unsplash.com/photo-1557683316-973673baf926?w=500" },
        { id: "friend2@mood.com", pw: "1234", name: "이무드", birth: "1999-08-24", status: "Mood with your friend.", img: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150", bg: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500" },
        { id: "friend3@mood.com", pw: "1234", name: "박드롭", birth: "2002-12-05", status: "배고프다 연락줘", img: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=150", bg: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500" }
    ];

    const fallbackNotices = [
        { title: "MOO:DROP 2026 그랜드 런칭 안내", content: "안녕하세요. MOO:DROP 감성 서비스에 오신 것을 환영합니다.\n본 계정간의 무결성 대화 시스템이 온전하게 가동중입니다." },
        { title: "보안 가동 공지", content: "모든 채팅방 오작동 방지 기술 필터가 적용되어 튕김, 지연, 더블전송이 근본적으로 차단됩니다." }
    ];

    // 데이터 저장 관리
    if(!localStorage.getItem('mood_users')) localStorage.setItem('mood_users', JSON.stringify(fallbackUsers));
    if(!localStorage.getItem('mood_notices')) localStorage.setItem('mood_notices', JSON.stringify(fallbackNotices));
    if(!localStorage.getItem('mood_rooms')) localStorage.setItem('mood_rooms', JSON.stringify([]));

    let USERS = JSON.parse(localStorage.getItem('mood_users'));
    let ROOMS = JSON.parse(localStorage.getItem('mood_rooms'));
    let currentUser = null;
    let activeRoomId = null;

    // 네비게이션 및 화면 전환 메커니즘
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function switchTab(tabName) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        if(tabName === 'profile') {
            document.getElementById('nav-prof').classList.add('active');
            document.getElementById('tab-profile').classList.add('active');
            renderProfileTab();
        } else if(tabName === 'chat') {
            document.getElementById('nav-chat').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            renderChatTab();
        } else if(tabName === 'other') {
            document.getElementById('nav-oth').classList.add('active');
            document.getElementById('tab-other').classList.add('active');
            renderOtherTab();
        }
    }

    function openSubScreen(id) { document.getElementById(id).classList.add('active'); }
    function closeSubScreen(id) { document.getElementById(id).classList.remove('active'); }

    // 데이터 싱크론
    function saveData() {
        localStorage.setItem('mood_users', JSON.stringify(USERS));
        localStorage.setItem('mood_rooms', JSON.stringify(ROOMS));
    }

    // 1. 회원 처리 시스템
    function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();
        
        const user = USERS.find(u => u.id === id && u.pw === pw);
        if(user) {
            currentUser = user;
            document.getElementById('main-bottom-nav').style.display = 'flex';
            switchTab('profile');
        } else {
            alert('아이디 또는 비밀번호가 올바르지 않습니다.');
        }
    }

    function handleRegister() {
        const id = document.getElementById('reg-id').value.trim();
        const pw = document.getElementById('reg-pw').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const birth = document.getElementById('reg-birth').value.trim();

        if(!id || !pw || !name || !birth) {
            alert('모든 양식을 정확하게 입력해주세요.');
            return;
        }
        if(USERS.some(u => u.id === id)) {
            alert('이미 존재하는 아이디입니다.');
            return;
        }

        const newUser = {
            id, pw, name, birth,
            status: "MOO:DROP에 들어왔습니다.",
            img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
            bg: "https://images.unsplash.com/photo-1557683316-973673baf926?w=500"
        };

        USERS.push(newUser);
        saveData();
        alert('회원가입이 완료되었습니다! 로그인 해주세요.');
        showScreen('screen-login');
    }

    function handleLogout() {
        currentUser = null;
        document.getElementById('main-bottom-nav').style.display = 'none';
        showScreen('screen-intro');
    }

    // 2. 프로필 대시보드 렌더링
    function renderProfileTab() {
        // 내 프로필 카드
        const myCard = document.getElementById('my-profile-card');
        myCard.innerHTML = `
            <div class="profile-item" onclick="openProfileDetail('${currentUser.id}')">
                <div class="profile-img" style="background-image: url('${currentUser.img}')"></div>
                <div class="profile-info">
                    <div class="name">${currentUser.name}</div>
                    <div class="sub">${currentUser.birth}</div>
                </div>
            </div>
        `;

        // 친구 목록 전체 자동 동기화 
        const friendContainer = document.getElementById('friend-list-container');
        friendContainer.innerHTML = '';
        
        const friends = USERS.filter(u => u.id !== currentUser.id);
        friends.forEach(f => {
            const row = document.createElement('div');
            row.className = 'profile-item';
            row.onclick = () => openProfileDetail(f.id);
            row.innerHTML = `
                <div class="profile-img" style="background-image: url('${f.img}')"></div>
                <div class="profile-info">
                    <div class="name">${f.name}</div>
                    <div class="sub">${f.status}</div>
                </div>
            `;
            friendContainer.appendChild(row);
        });
    }

    // 프로필 세부화면 열기
    function openProfileDetail(userId) {
        const target = USERS.find(u => u.id === userId);
        if(!target) return;

        document.getElementById('detail-bg-img').style.backgroundImage = `url('${target.bg}')`;
        document.getElementById('detail-user-img').style.backgroundImage = `url('${target.img}')`;
        document.getElementById('detail-user-name').innerText = target.name;
        document.getElementById('detail-user-status').innerText = target.status;

        const chatBtn = document.getElementById('detail-chat-turn-btn');
        
        // 내 프로필이거나 타인 프로필이거나 관계없이 실시간 1:1 대화 추적기 가동
        chatBtn.onclick = () => {
            closeSubScreen('sub-profile-detail');
            startDirectChat(target);
        };

        openSubScreen('sub-profile-detail');
    }

    // 1:1 채팅방 조회 혹은 실시간 고속 생성 후 즉각 안전 진입
    function startDirectChat(targetUser) {
        if(targetUser.id === currentUser.id) {
            alert('나 자신과의 대화는 지원하지 않습니다. 다른 친구를 선택하세요.');
            return;
        }

        let room = ROOMS.find(r => r.isGroup === false && r.members.includes(currentUser.id) && r.members.includes(targetUser.id));
        
        if(!room) {
            room = {
                id: 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                isGroup: false,
                roomName: targetUser.name,
                img: targetUser.img,
                members: [currentUser.id, targetUser.id],
                messages: []
            };
            ROOMS.push(room);
            saveData();
        }
        openChatRoom(room.id);
    }

    // 3. 채팅 탭 메인 리스트 제어
    function renderChatTab() {
        const container = document.getElementById('chat-list-container');
        container.innerHTML = '';

        // 유저가 속해있는 채팅방만 정확하게 필터
        const myRooms = ROOMS.filter(r => r.members.includes(currentUser.id));

        if(myRooms.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:40px; font-size:14px;">참여 중인 채팅방이 없습니다.</div>`;
            return;
        }

        myRooms.forEach(r => {
            let displayTitle = r.roomName;
            let displayImg = r.img || 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=150';
            
            // 1:1 채팅방인 경우 상대방 이름과 프사로 보정 출력
            if(!r.isGroup) {
                const otherId = r.members.find(m => m !== currentUser.id);
                const otherUser = USERS.find(u => u.id === otherId);
                if(otherUser) {
                    displayTitle = otherUser.name;
                    displayImg = otherUser.img;
                }
            }

            const lastMsg = r.messages.length > 0 ? r.messages[r.messages.length - 1].text : '대화 내용이 없습니다.';

            const item = document.createElement('div');
            item.className = 'profile-item';
            item.onclick = () => openChatRoom(r.id);
            item.innerHTML = `
                <div class="profile-img" style="background-image: url('${displayImg}')"></div>
                <div class="profile-info">
                    <div class="name">${displayTitle} <span style="font-size:12px; color:var(--text-muted); font-weight:normal;">(${r.members.length}명)</span></div>
                    <div class="sub">${lastMsg}</div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    // 그룹채팅 생성 모달 컨트롤
    function openCreateChatModal() {
        const container = document.getElementById('invite-checkbox-container');
        container.innerHTML = '';
        
        const friends = USERS.filter(u => u.id !== currentUser.id);
        friends.forEach(f => {
            const div = document.createElement('div');
            div.className = 'check-item';
            div.innerHTML = `
                <input type="checkbox" value="${f.id}" class="create-chat-check">
                <div class="profile-img" style="width:40px; height:40px; background-image:url('${f.img}')"></div>
                <div style="font-weight:600;">${f.name}</div>
            `;
            container.appendChild(div);
        });

        document.getElementById('new-chat-title').value = '';
        openSubScreen('sub-create-chat');
    }

    function submitCreateChat() {
        const title = document.getElementById('new-chat-title').value.trim();
        if(!title) { alert('채팅방 이름을 입력하세요.'); return; }

        const checkedBoxes = document.querySelectorAll('.create-chat-check:checked');
        let selectedMembers = [currentUser.id];
        checkedBoxes.forEach(box => selectedMembers.push(box.value));

        if(selectedMembers.length < 2) {
            alert('최소 1명 이상의 친구를 선택하셔야 그룹채팅 생성이 가능합니다.');
            return;
        }

        const newRoom = {
            id: 'room_' + Date.now(),
            isGroup: true,
            roomName: title,
            img: 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=150', // 그룹 기본 이미지
            members: selectedMembers,
            messages: []
        };

        ROOMS.push(newRoom);
        saveData();
        closeSubScreen('sub-create-chat');
        renderChatTab();
        openChatRoom(newRoom.id);
    }

    // 4. 완벽 대화방 트랜잭션 (더블 전송 버그 원천 차단형)
    let messageSubmitLock = false; // 더블 전송 방지 전역 락커

    function openChatRoom(roomId) {
        activeRoomId = roomId;
        const room = ROOMS.find(r => r.id === roomId);
        if(!room) return;

        // 헤더 룸 이름 바인딩
        let displayTitle = room.roomName;
        if(!room.isGroup) {
            const otherId = room.members.find(m => m !== currentUser.id);
            const otherUser = USERS.find(u => u.id === otherId);
            if(otherUser) displayTitle = otherUser.name;
        }
        document.getElementById('chat-room-title-text').innerText = displayTitle;
        
        // 메시지 내역 렌더링
        renderMessages();
        openSubScreen('sub-chat-room');
    }

    function closeChatRoom() {
        closeSubScreen('sub-chat-room');
        activeRoomId = null;
        renderChatTab(); // 목록 최신화
    }

    function renderMessages() {
        const container = document.getElementById('chat-msg-container');
        container.innerHTML = '';
        
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        room.messages.forEach(m => {
            const row = document.createElement('div');
            
            if(m.senderId === currentUser.id) {
                row.className = 'msg-row me';
                row.innerHTML = `
                    <div class="msg-bubble">${m.text}</div>
                `;
            } else {
                row.className = 'msg-row other';
                const sender = USERS.find(u => u.id === m.senderId) || { name: "알수없음", img: "" };
                row.innerHTML = `
                    <div class="profile-img" style="width:36px; height:36px; background-image:url('${sender.img}')"></div>
                    <div class="msg-other-content">
                        <div class="msg-other-top">${sender.name} <span style="font-size:10px; font-weight:normal; margin-left:4px;">${m.time}</span></div>
                        <div class="msg-bubble">${m.text}</div>
                    </div>
                `;
            }
            container.appendChild(row);
        });
        
        // 스크롤 즉시 최하단 자동 이동
        container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
        if(messageSubmitLock) return; // 락 걸려있으면 전송 거절

        const inputField = document.getElementById('chat-typing-field');
        const text = inputField.value.trim();
        if(!text) return;

        messageSubmitLock = true; // 즉각 고속 잠금 처리

        const roomIndex = ROOMS.findIndex(r => r.id === activeRoomId);
        if(roomIndex !== -1) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
            
            const newMsg = {
                senderId: currentUser.id,
                text: text,
                time: timeStr
            };

            ROOMS[roomIndex].messages.push(newMsg);
            saveData();
            renderMessages();
            inputField.value = '';

            // 가상 테스트 원활함을 위한 시스템 상대방 오토 리플라이 시뮬레이션 인터벌 (오류 검증용)
            if(ROOMS[roomIndex].members.length > 1) {
                simulatePartnerReply(roomIndex);
            }
        }

        setTimeout(() => { messageSubmitLock = false; }, 100); // 0.1초 뒤 자동 해제
    }

    // 상대방 자동 답변봇 시뮬레이션 (동작 테스트 확인 용이성 확보 목적)
    function simulatePartnerReply(roomIndex) {
        const otherMembers = ROOMS[roomIndex].members.filter(m => m !== currentUser.id);
        if(otherMembers.length === 0) return;
        
        const randomSender = otherMembers[Math.floor(Math.random() * otherMembers.length)];
        
        setTimeout(() => {
            // 아직 유저가 해당 방에 머물러 있을 때만 전송
            if(activeRoomId === ROOMS[roomIndex].id) {
                const now = new Date();
                const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
                ROOMS[roomIndex].messages.push({
                    senderId: randomSender,
                    text: "✨ MOO:DROP 정상 응답이 완료되었습니다.",
                    time: timeStr
                });
                saveData();
                renderMessages();
            }
        }, 1000);
    }

    function triggerDummyPhoto() {
        const inputField = document.getElementById('chat-typing-field');
        inputField.value = "📷 [사진 전송 완료] ";
        sendMessage();
    }

    // 5. 채팅방 디테일 설정 모달 제어
    function openChatRoomSetting() {
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        document.getElementById('edit-chatroom-title').value = room.roomName;
        document.getElementById('edit-chatroom-img').value = room.img || '';

        // 멤버 리스트와 내보내기/초대 구현
        const listContainer = document.getElementById('chatroom-member-list');
        listContainer.innerHTML = '';

        // 전체 유저 중 방에 없는 유저는 초대 가능 옵션 추가를 위해 목록 분할
        USERS.forEach(u => {
            const isMember = room.members.includes(u.id);
            const row = document.createElement('div');
            row.style.cssText = "display:flex; justify-content:between; align-items:center; padding:8px 0; border-bottom:1px solid #f2f2f7; font-size:14px;";
            
            if(isMember) {
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <div class="profile-img" style="width:30px; height:30px; background-image:url('${u.img}')"></div>
                        <div>${u.name} (참여중)</div>
                    </div>
                `;
            } else {
                // 나간 사람 혹은 미참여원 실시간 즉각 재초대 버튼 활성화
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px; opacity:0.6;">
                        <div class="profile-img" style="width:30px; height:30px; background-image:url('${u.img}')"></div>
                        <div>${u.name}</div>
                    </div>
                    <button class="btn-small-gray" style="padding:4px 8px; font-size:11px;" onclick="inviteUserToActiveRoom('${u.id}')">초대</button>
                `;
            }
            listContainer.appendChild(row);
        });

        openSubScreen('sub-chat-setting');
    }

    function saveChatRoomSetting() {
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        const newTitle = document.getElementById('edit-chatroom-title').value.trim();
        const newImg = document.getElementById('edit-chatroom-img').value.trim();

        if(!newTitle) { alert('방 이름을 입력하세요.'); return; }
        
        room.roomName = newTitle;
        if(newImg) room.img = newImg;

        saveData();
        alert('채팅방 설정이 성공적으로 변경되었습니다.');
        closeSubScreen('sub-chat-setting');
        document.getElementById('chat-room-title-text').innerText = newTitle;
    }

    function inviteUserToActiveRoom(userId) {
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;
        
        if(!room.members.includes(userId)) {
            room.members.push(userId);
            saveData();
            openChatRoomSetting(); // 리스트 새로고침
            renderMessages();
        }
    }

    function leaveChatRoom() {
        const roomIndex = ROOMS.findIndex(r => r.id === activeRoomId);
        if(roomIndex === -1) return;

        // 멤버 목록에서 현재 유저 제거
        ROOMS[roomIndex].members = ROOMS[roomIndex].members.filter(m => m !== currentUser.id);
        
        // 만약 방에 아무도 안남아있다면 완전 삭제 파괴 메커니즘 실행해 데이터 부하 제거
        if(ROOMS[roomIndex].members.length === 0) {
            ROOMS.splice(roomIndex, 1);
        }

        saveData();
        closeSubScreen('sub-chat-setting');
        closeChatRoom();
    }


    // 6. OTHER 탭 내부 세부 옵션 기능 제어
    function renderOtherTab() {
        document.getElementById('other-my-img').style.backgroundImage = `url('${currentUser.img}')`;
        document.getElementById('other-my-name').innerText = currentUser.name;
    }

    function openSettingModal() {
        document.getElementById('set-my-name').value = currentUser.name;
        document.getElementById('set-my-status').value = currentUser.status;
        document.getElementById('set-my-img').value = currentUser.img;
        document.getElementById('set-my-bg').value = currentUser.bg;
        openSubScreen('sub-my-setting');
    }

    function saveMySetting() {
        const name = document.getElementById('set-my-name').value.trim();
        const status = document.getElementById('set-my-status').value.trim();
        const img = document.getElementById('set-my-img').value.trim();
        const bg = document.getElementById('set-my-bg').value.trim();

        if(!name) { alert('이름은 공백일 수 없습니다.'); return; }

        currentUser.name = name;
        currentUser.status = status;
        if(img) currentUser.img = img;
        if(bg) currentUser.bg = bg;

        // 전체 유저 풀 동기화 업데이트 적용
        const idx = USERS.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) USERS[idx] = currentUser;

        saveData();
        closeSubScreen('sub-my-setting');
        renderOtherTab();
        alert('개인 설정이 저장되었습니다.');
    }

    // 공지사항 로직
    function openNoticeModal() {
        // 관리자 아이디 [ jse131121@mood.com ] 검증 후 쓰기 권한 노출 결정
        const adminBtn = document.getElementById('admin-notice-write-btn');
        if(currentUser.id === "jse131121@mood.com") {
            adminBtn.style.display = 'block';
        } else {
            adminBtn.style.display = 'none';
        }
        
        document.getElementById('admin-notice-form').style.display = 'none';
        renderNotices();
        openSubScreen('sub-notice');
    }

    function toggleNoticeForm() {
        const form = document.getElementById('admin-notice-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function submitNotice() {
        const title = document.getElementById('new-notice-title').value.trim();
        const content = document.getElementById('new-notice-content').value.trim();

        if(!title || !content) { alert('공지 내용을 입력하세요.'); return; }

        let notices = JSON.parse(localStorage.getItem('mood_notices')) || [];
        notices.unshift({ title, content });
        localStorage.setItem('mood_notices', JSON.stringify(notices));

        document.getElementById('new-notice-title').value = '';
        document.getElementById('new-notice-content').value = '';
        toggleNoticeForm();
        renderNotices();
    }

    function renderNotices() {
        const container = document.getElementById('notice-list-container');
        container.innerHTML = '';
        
        let notices = JSON.parse(localStorage.getItem('mood_notices')) || [];
        notices.forEach((n, index) => {
            const item = document.createElement('div');
            item.className = 'notice-item';
            item.innerHTML = `
                <div class="notice-title-bar" onclick="toggleNoticeContent(${index})">
                    <span>📌 ${n.title}</span>
                    <span id="notice-arrow-${index}" style="font-size:12px; color:var(--text-muted);">▼</span>
                </div>
                <div class="notice-content" id="notice-content-${index}">${n.content.replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(item);
        });
    }

    function toggleNoticeContent(idx) {
        const content = document.getElementById(`notice-content-${idx}`);
        const arrow = document.getElementById(`notice-arrow-${idx}`);
        if(content.style.display === 'block') {
            content.style.display = 'none';
            arrow.innerText = '▼';
        } else {
            content.style.display = 'block';
            arrow.innerText = '▲';
        }
    }
</script>
