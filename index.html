<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOO:DROP</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --point-color: #b3e5fc;
            --my-bubble: #b3e5fc;
            --other-bubble: #1c1c1e;
            --border-color: #e5e5ea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* [수정] ASUS 노트북 편집기 환경을 위한 높이 축소 및 스크롤 전면 보장 */
        #app {
            width: 100%;
            max-width: 390px;
            height: 100%;
            max-height: 70vh; /* 편집 화면을 가리지 않게 전체 높이를 확실히 축소 */
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        .screen-header {
            padding: 30px 20px 10px 20px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-main);
            background: var(--bg-color);
            border-bottom: 1px solid transparent;
            flex-shrink: 0;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: #ffffff;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 5px;
            z-index: 10;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            height: 100%;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 2px;
            transition: stroke 0.2s;
        }

        .nav-item.active svg {
            stroke: var(--point-color);
            fill: rgba(179, 229, 252, 0.2);
        }

        #screen-intro {
            justify-content: space-between;
            padding: 50px 30px 30px 30px;
            text-align: center;
            overflow-y: auto;
        }

        .intro-top h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .intro-top p {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .intro-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-black {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-black:active {
            opacity: 0.8;
        }

        .form-screen {
            padding: 30px 24px;
            overflow-y: auto; /* [수정] 폼 화면 스크롤 절대 보장 */
        }
        .form-screen::-webkit-scrollbar { display: none; }
        .form-header {
            margin-bottom: 20px;
        }
        .form-header h2 { font-size: 24px; font-weight: 700; }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding-left: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        
        /* [추정/신규] 아티스트 자격 선택용 체크박스 래퍼 스타일 */
        .check-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .check-container input {
            width: 18px;
            height: 18px;
        }

        .back-text-btn {
            text-align: center;
            margin-top: 15px;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            padding-bottom: 10px;
        }

        /* [수정] 스크롤 다 되게 패딩 가이드라인 가볍게 최적화 */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 80px 20px;
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        .section-title {
            font-size: 12px;
            color: var(--text-muted);
            margin: 12px 0 6px 0;
            font-weight: 500;
        }

        .profile-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .profile-img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            margin-right: 12px;
            background-color: #e1e1e1;
            flex-shrink: 0;
        }
        .profile-info {
            flex: 1;
            overflow: hidden;
        }
        .profile-info .name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 2px;
        }
        .profile-info .sub {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 20;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .sub-screen.active { display: flex; }

        .profile-detail-bg {
            height: 35%;
            background-size: cover;
            background-position: center;
            background-color: #cbd5e1;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
        }
        .close-btn svg { width: 16px; height: 16px; stroke: #ffffff; stroke-width: 2.5px; }
        
        .profile-detail-body {
            flex: 1;
            position: relative;
            padding-top: 55px;
            text-align: center;
            background: var(--bg-color);
            overflow-y: auto; /* 상세 프로필 스크롤 보장 */
        }
        .profile-detail-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--bg-color);
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background-size: cover;
            background-position: center;
            background-color: #e1e1e1;
        }
        .detail-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .detail-status { font-size: 13px; color: var(--text-muted); padding: 0 20px; }
        .detail-action-space {
            margin-top: 30px;
            padding: 0 30px 20px 30px;
        }

        .chat-room-header {
            padding: 30px 15px 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
            flex-shrink: 0;
        }
        .chat-room-left { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
        .back-arrow { cursor: pointer; display: flex; align-items: center; }
        .back-arrow svg { width: 22px; height: 22px; stroke: var(--text-main); stroke-width: 2px; }
        .setting-icon-btn { cursor: pointer; display: flex; align-items: center; }
        .setting-icon-btn svg { width: 22px; height: 22px; stroke: var(--text-main); stroke-width: 2px; fill: none; }

        .chat-messages-area {
            flex: 1;
            overflow-y: auto; /* [수정] 말풍선 스크롤 보장 */
            padding: 15px;
            background-color: #f2f2f7;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-messages-area::-webkit-scrollbar { display: none; }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; gap: 6px; }

        .msg-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
        }
        .msg-row.me .msg-bubble {
            background-color: var(--my-bubble);
            color: #000000;
            border-top-right-radius: 4px;
        }
        .msg-row.other .msg-bubble {
            background-color: var(--other-bubble);
            color: #ffffff;
            border-top-left-radius: 4px;
        }
        .msg-other-content { display: flex; flex-direction: column; gap: 2px; max-width: 70%; }
        .msg-meta { font-size: 10px; color: var(--text-muted); display: flex; align-items: flex-end; margin: 0 4px; }
        .msg-other-top { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .chat-input-bar {
            padding: 8px 10px 15px 10px;
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            flex-shrink: 0;
        }
        .chat-cam-btn {
            width: 38px;
            height: 38px;
            background-color: #f2f2f7;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }
        .chat-cam-btn svg { width: 20px; height: 20px; fill: var(--text-muted); }
        .chat-text-input {
            flex: 1;
            height: 38px;
            background-color: #f2f2f7;
            border: none;
            border-radius: 18px;
            padding: 0 14px;
            font-size: 14px;
            outline: none;
        }
        .chat-send-btn {
            height: 38px;
            padding: 0 14px;
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        .add-chat-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .btn-small-gray {
            background: #e5e5ea;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
        }

        .setting-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }
        .round-rect-btn {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notice-item {
            background: #ffffff;
            border-radius: 12px;
            margin-bottom: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .notice-title-bar {
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            background: #ffffff;
        }
        .notice-content {
            padding: 12px;
            background: #f8f9fa;
            border-top: 1px solid var(--border-color);
            display: none;
            font-size: 13px;
            line-height: 1.5;
        }

        .danger-text { color: #ff3b30 !important; font-weight: 700; }
    </style>
</head>
<body>

<div id="app">

    <!-- ========================================== -->
    <!-- 1. 로그인 & 회원가입 첫 화면 -->
    <!-- ========================================== -->
    <div id="screen-intro" class="screen active">
        <div class="intro-top">
            <h1 style="color: #000000; font-weight:900;">MOO:DROP</h1>
            <p>Mood with your friend,<br>Mood is right here.</p>
        </div>
        <div class="intro-buttons">
            <button class="btn-black" onclick="showScreen('screen-login')">로그인</button>
            <button class="btn-black" onclick="showScreen('screen-register')">회원가입</button>
        </div>
    </div>

    <!-- 1-2. 로그인 단독 스크린 -->
    <div id="screen-login" class="screen form-screen">
        <div class="form-header">
            <h2>로그인</h2>
        </div>
        <div class="form-group">
            <label>이메일 아이디</label>
            <input type="email" id="login-id" placeholder="example@mood.com" value="artist1@mood.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" value="1234">
        </div>
        <button class="btn-black" style="margin-top: 15px;" onclick="handleLogin()">로그인 완료</button>
        <div class="back-text-btn" onclick="showScreen('screen-intro')">돌아가기</div>
    </div>

    <!-- 1-3. 회원가입 스크린 (아티스트 자격 추가) -->
    <div id="screen-register" class="screen form-screen">
        <div class="form-header">
            <h2>회원가입</h2>
        </div>
        <div class="form-group">
            <label>이메일 아이디</label>
            <input type="email" id="reg-id" placeholder="사용할 이메일을 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="reg-pw" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="form-group">
            <label>이름 (닉네임)</label>
            <input type="text" id="reg-name" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label>생년월일 (YYYY-MM-DD)</label>
            <input type="text" id="reg-birth" placeholder="예: 2000-01-01">
        </div>
        
        <!-- [수정] 아티스트 지정용 전용 체크박스 추가 -->
        <label class="check-container">
            <input type="checkbox" id="reg-is-artist">
            <span>나 지금 아티스트입니다 체크</span>
        </label>

        <button class="btn-black" style="margin-top: 15px;" onclick="handleRegister()">가입 완료</button>
        <div class="back-text-btn" onclick="showScreen('screen-intro')">돌아가기</div>
    </div>


    <!-- ========================================== -->
    <!-- 메인 탭 화면들 -->
    <!-- ========================================== -->

    <!-- 2. 프로필 탭 -->
    <div id="tab-profile" class="screen">
        <div class="screen-header">PROFILE</div>
        <div class="scroll-content">
            <div class="section-title">내 프로필</div>
            <div id="my-profile-card"></div>
            
            <div class="section-title" style="margin-top: 20px;">내 친구 (아티스트만 표시)</div>
            <div id="friend-list-container"></div>
        </div>
    </div>

    <!-- 3. 채팅 탭 -->
    <div id="tab-chat" class="screen">
        <div class="screen-header">CHAT</div>
        <div class="scroll-content">
            <div class="add-chat-row" id="group-chat-btn-wrapper" style="display:none;">
                <button class="btn-small-gray" onclick="openCreateChatModal()">+ 그룹 채팅 만들기</button>
            </div>
            <div id="chat-list-container"></div>
        </div>
    </div>

    <!-- 4. 그 외(Other) 탭 -->
    <div id="tab-other" class="screen">
        <div class="screen-header">OTHER</div>
        <div class="scroll-content">
            <div style="display:flex; flex-direction:column; align-items:center; margin: 10px 0 15px 0;">
                <div id="other-my-img" class="profile-img" style="width:60px; height:60px; margin-right:0; margin-bottom:8px;"></div>
                <div id="other-my-name" style="font-size:16px; font-weight:700;">이름</div>
            </div>

            <div class="setting-box-container">
                <button class="round-rect-btn" onclick="openSettingModal()">
                    <span>SETTING</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="round-rect-btn" onclick="openNoticeModal()">
                    <span>NOTICE</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
                <button class="round-rect-btn" onclick="handleLogout()" style="border-color:#ff3b30; color:#ff3b30;">
                    <span>LOGOUT</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 고정 하단 탭 바 -->
    <div id="main-bottom-nav" class="bottom-nav" style="display: none;">
        <div class="nav-item active" id="nav-prof" onclick="switchTab('profile')">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
            <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div class="nav-item" id="nav-oth" onclick="switchTab('other')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- 서브 스크린 및 모달 레이어 -->
    <!-- ========================================== -->

    <!-- 프로필 상세 창 -->
    <div id="sub-profile-detail" class="sub-screen">
        <div class="profile-detail-bg" id="detail-bg-img">
            <button class="close-btn" onclick="closeSubScreen('sub-profile-detail')">
                <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="profile-detail-body">
            <div class="profile-detail-img" id="detail-user-img"></div>
            <div class="detail-name" id="detail-user-name">이름</div>
            <div class="detail-status" id="detail-user-status">상태메세지 내용</div>
            <div class="detail-action-space">
                <button class="btn-black" id="detail-chat-turn-btn">채팅하러 가기</button>
            </div>
        </div>
    </div>

    <!-- 1:N 버블 전용 통합 대화방 -->
    <div id="sub-chat-room" class="sub-screen" style="background-color: #f2f2f7;">
        <div class="chat-room-header">
            <div class="chat-room-left">
                <div class="back-arrow" onclick="closeChatRoom()"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6"/></svg></div>
                <span id="chat-room-title-text">채팅방</span>
            </div>
            <div class="setting-icon-btn" onclick="openChatRoomSetting()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
        </div>
        <div class="chat-messages-area" id="chat-msg-container"></div>
        <div class="chat-input-bar">
            <button class="chat-cam-btn" onclick="triggerDummyPhoto()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
            <input type="text" class="chat-text-input" id="chat-typing-field" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <!-- 그룹채팅 생성 모달 (아티스트에게는 일반 그룹 생성 보장용) -->
    <div id="sub-create-chat" class="sub-screen form-screen">
        <div class="form-header"><h2>그룹채팅 생성</h2></div>
        <div class="form-group">
            <label>채팅방 이름</label>
            <input type="text" id="new-chat-title" placeholder="방 이름을 적어주세요">
        </div>
        <div class="section-title">초대할 친구 선택</div>
        <div id="invite-checkbox-container" style="max-height:180px; overflow-y:auto; margin-bottom:15px;"></div>
        <button class="btn-black" onclick="submitCreateChat()">생성하기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-create-chat')">취소</div>
    </div>

    <!-- 채팅방 설정 스크린 -->
    <div id="sub-chat-setting" class="sub-screen" style="padding: 30px 20px; overflow-y: auto;">
        <div class="form-header"><h2>채팅방 설정</h2></div>
        <div class="form-group">
            <label>채팅방 이름 변경</label>
            <input type="text" id="edit-chatroom-title">
        </div>
        <div class="form-group">
            <label>채팅방 프로필 사진 이미지 URL</label>
            <input type="text" id="edit-chatroom-img">
        </div>
        <button class="btn-black" style="padding:10px; margin-bottom:15px;" onclick="saveChatRoomSetting()">방 정보 수정 완료</button>
        
        <div class="section-title">참여중인 사람 목록</div>
        <div id="chatroom-member-list" style="max-height:120px; overflow-y:auto; margin-bottom:15px;"></div>
        
        <button class="round-rect-btn danger-text" onclick="leaveChatRoom()" style="justify-content:center; border-color:#ff3b30;">나가기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-chat-setting')">닫기</div>
    </div>

    <!-- 개인 설정(SETTING) 모달 -->
    <div id="sub-my-setting" class="sub-screen form-screen">
        <div class="form-header"><h2>프로필 설정 변경</h2></div>
        <div class="form-group"><label>이름</label><input type="text" id="set-my-name"></div>
        <div class="form-group"><label>상태메세지</label><input type="text" id="set-my-status"></div>
        <div class="form-group"><label>프로필 사진 URL</label><input type="text" id="set-my-img"></div>
        <div class="form-group"><label>배경 사진 URL</label><input type="text" id="set-my-bg"></div>
        <button class="btn-black" onclick="saveMySetting()">저장하기</button>
        <div class="back-text-btn" onclick="closeSubScreen('sub-my-setting')">취소</div>
    </div>

    <!-- 공지사항(NOTICE) 모달 -->
    <div id="sub-notice" class="sub-screen" style="padding:30px 20px; overflow-y:auto;">
        <div class="form-header" style="display:flex; justify-content:space-between; align-items:center;">
            <h2>공지사항</h2>
            <button class="btn-small-gray" id="admin-notice-write-btn" style="display:none;" onclick="toggleNoticeForm()">글쓰기</button>
        </div>
        <div id="admin-notice-form" style="display:none; background:#ffffff; padding:12px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border-color);">
            <input type="text" id="new-notice-title" placeholder="공지 제목" style="width:100%; padding:8px; margin-bottom:8px; border-radius:8px; border:1px solid var(--border-color);"><br>
            <textarea id="new-notice-content" placeholder="공지 내용" style="width:100%; height:60px; padding:8px; margin-bottom:8px; border-radius:8px; border:1px solid var(--border-color); resize:none;"></textarea>
            <button class="btn-black" style="padding:8px;" onclick="submitNotice()">등록</button>
        </div>
        <div id="notice-list-container" style="flex:1; overflow-y:auto; max-height:240px;"></div>
        <div class="back-text-btn" onclick="closeSubScreen('sub-notice')">닫기</div>
    </div>

</div>

<!-- ========================================== -->
<!-- 1:N 버블 전용 시스템 엔진 스크립트 -->
<!-- ========================================== -->
<script>
    const fallbackUsers = [
        { id: "artist1@mood.com", pw: "1234", name: "루카(LUCA)", birth: "2004-03-15", status: "오늘도 연습 중이야 @@@ 잘 지내? ✨", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150", bg: "https://images.unsplash.com/photo-1557683316-973673baf926?w=500", isArtist: true },
        { id: "artist2@mood.com", pw: "1234", name: "로지(ROSSY)", birth: "2003-11-21", status: "@@@을 위한 특별곡 작업 시작 🎵", img: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150", bg: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500", isArtist: true },
        { id: "fan1@mood.com", pw: "1234", name: "행복한팬", birth: "2001-05-12", status: "최애 최고", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150", bg: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500", isArtist: false },
        { id: "fan2@mood.com", pw: "1234", name: "무드코더", birth: "1999-08-24", status: "ASUS 노트북으로 코딩중", img: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150", bg: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500", isArtist: false }
    ];

    const fallbackRooms = [
        {
            id: "bubble_artist1",
            isGroup: true,
            isBubble: true,
            roomName: "루카(LUCA) 프라이빗 버블",
            img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
            artistId: "artist1@mood.com",
            members: ["artist1@mood.com", "fan1@mood.com", "fan2@mood.com"],
            messages: [
                { senderId: "artist1@mood.com", senderName: "루카(LUCA)", text: "안녕 @@@! 오늘 날씨 진짜 좋다 그치?", time: "12:00" },
                { senderId: "fan1@mood.com", senderName: "행복한팬", text: "루카야 보고싶어!!", time: "12:01" },
                { senderId: "fan2@mood.com", senderName: "무드코더", text: "ASUS 화면에서 잘 보여요!!", time: "12:02" }
            ]
        }
    ];

    if(!localStorage.getItem('mood_users')) localStorage.setItem('mood_users', JSON.stringify(fallbackUsers));
    if(!localStorage.getItem('mood_rooms')) localStorage.setItem('mood_rooms', JSON.stringify(fallbackRooms));
    if(!localStorage.getItem('mood_notices')) localStorage.setItem('mood_notices', JSON.stringify([]));

    let USERS = JSON.parse(localStorage.getItem('mood_users'));
    let ROOMS = JSON.parse(localStorage.getItem('mood_rooms'));
    let currentUser = null;
    let activeRoomId = null;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function switchTab(tabName) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        if(tabName === 'profile') {
            document.getElementById('nav-prof').classList.add('active');
            document.getElementById('tab-profile').classList.add('active');
            renderProfileTab();
        } else if(tabName === 'chat') {
            document.getElementById('nav-chat').classList.add('active');
            document.getElementById('tab-chat').classList.add('active');
            renderChatTab();
        } else if(tabName === 'other') {
            document.getElementById('nav-oth').classList.add('active');
            document.getElementById('tab-other').classList.add('active');
            renderOtherTab();
        }
    }

    function openSubScreen(id) { document.getElementById(id).classList.add('active'); }
    function closeSubScreen(id) { document.getElementById(id).classList.remove('active'); }

    function saveData() {
        localStorage.setItem('mood_users', JSON.stringify(USERS));
        localStorage.setItem('mood_rooms', JSON.stringify(ROOMS));
    }

    function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();
        const user = USERS.find(u => u.id === id && u.pw === pw);
        if(user) {
            currentUser = user;
            document.getElementById('main-bottom-nav').style.display = 'flex';
            document.getElementById('group-chat-btn-wrapper').style.display = currentUser.isArtist ? 'flex' : 'none';
            switchTab('profile');
        } else {
            alert('아이디 또는 비밀번호가 올바르지 않습니다.');
        }
    }

    function handleRegister() {
        const id = document.getElementById('reg-id').value.trim();
        const pw = document.getElementById('reg-pw').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const birth = document.getElementById('reg-birth').value.trim();
        const isArtist = document.getElementById('reg-is-artist').checked;

        if(!id || !pw || !name || !birth) {
            alert('양식을 다 입력하세요.');
            return;
        }
        if(USERS.some(u => u.id === id)) {
            alert('중복 아이디 존재.');
            return;
        }

        const newUser = {
            id, pw, name, birth, isArtist,
            status: isArtist ? "아티스트 소통 공간입니다. @@@ 반가워!" : "행복한 Mood 공간.",
            img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
            bg: "https://images.unsplash.com/photo-1557683316-973673baf926?w=500"
        };

        USERS.push(newUser);

        // 만약 새로운 아티스트가 추가되면 전용 버블룸 강제 매칭 연동
        if(isArtist) {
            ROOMS.push({
                id: 'bubble_' + Date.now(),
                isGroup: true,
                isBubble: true,
                roomName: name + " 프라이빗 버블",
                img: newUser.img,
                artistId: id,
                members: [id],
                messages: []
            });
        } else {
            // 팬인 경우 기존 생성된 모든 아티스트 버블룸방 멤버에 자동 등록 처리
            ROOMS.forEach(r => { if(r.isBubble) r.members.push(id); });
        }

        saveData();
        alert('가입 완료! 설정한 계정으로 로그인해 주세요.');
        showScreen('screen-login');
    }

    function handleLogout() {
        currentUser = null;
        document.getElementById('main-bottom-nav').style.display = 'none';
        showScreen('screen-intro');
    }

    function renderProfileTab() {
        const myCard = document.getElementById('my-profile-card');
        myCard.innerHTML = `
            <div class="profile-item" onclick="openProfileDetail('${currentUser.id}')">
                <div class="profile-img" style="background-image: url('${currentUser.img}')"></div>
                <div class="profile-info">
                    <div class="name">${currentUser.name} ${currentUser.isArtist ? '⭐' : '✉️'}</div>
                    <div class="sub">${currentUser.status.replace(/@@@/g, currentUser.name)}</div>
                </div>
            </div>
        `;

        const friendContainer = document.getElementById('friend-list-container');
        friendContainer.innerHTML = '';
        
        // [수정] 오직 '아티스트' 자격을 가진 유저들만 친구 목록에 노출되도록 제한 (팬은 미노출)
        const displayTargets = USERS.filter(u => u.id !== currentUser.id && u.isArtist === true);
        
        if(displayTargets.length === 0) {
            friendContainer.innerHTML = `<div style="padding:15px 0; font-size:13px; color:var(--text-muted);">표시할 아티스트가 없습니다.</div>`;
            return;
        }

        displayTargets.forEach(f => {
            const row = document.createElement('div');
            row.className = 'profile-item';
            row.onclick = () => openProfileDetail(f.id);
            row.innerHTML = `
                <div class="profile-img" style="background-image: url('${f.img}')"></div>
                <div class="profile-info">
                    <div class="name">${f.name} ⭐</div>
                    <div class="sub">${f.status.replace(/@@@/g, currentUser.name)}</div>
                </div>
            `;
            friendContainer.appendChild(row);
        });
    }

    function openProfileDetail(userId) {
        const target = USERS.find(u => u.id === userId);
        if(!target) return;

        document.getElementById('detail-bg-img').style.backgroundImage = `url('${target.bg}')`;
        document.getElementById('detail-user-img').style.backgroundImage = `url('${target.img}')`;
        document.getElementById('detail-user-name').innerText = target.name;
        document.getElementById('detail-user-status').innerText = target.status.replace(/@@@/g, currentUser.name);

        const chatBtn = document.getElementById('detail-chat-turn-btn');
        chatBtn.onclick = () => {
            closeSubScreen('sub-profile-detail');
            // 아티스트 전용 소통 채널 연결 우선 탐색
            let bubbleRoom = ROOMS.find(r => r.isBubble && (r.artistId === target.id || r.artistId === currentUser.id));
            if(bubbleRoom) {
                openChatRoom(bubbleRoom.id);
            } else {
                alert('연결 가능한 전용 채널방이 존재하지 않습니다.');
            }
        };

        openSubScreen('sub-profile-detail');
    }

    function renderChatTab() {
        const container = document.getElementById('chat-list-container');
        container.innerHTML = '';

        const myRooms = ROOMS.filter(r => r.members.includes(currentUser.id));

        if(myRooms.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:30px; font-size:13px;">대화 채널이 없습니다.</div>`;
            return;
        }

        myRooms.forEach(r => {
            let displayTitle = r.roomName;
            let displayImg = r.img;
            
            // 마지막 인덱스 메시지 가공 처리 후 미리보기 연동
            let lastMsg = '대화 내용이 없습니다.';
            if(r.messages.length > 0) {
                let lastItem = r.messages[r.messages.length - 1];
                lastMsg = lastItem.text.replace(/@@@/g, currentUser.name);
            }

            const item = document.createElement('div');
            item.className = 'profile-item';
            item.onclick = () => openChatRoom(r.id);
            item.innerHTML = `
                <div class="profile-img" style="background-image: url('${displayImg}')"></div>
                <div class="profile-info">
                    <div class="name">${displayTitle} <span style="font-size:11px; color:var(--text-muted); font-weight:normal;">[Private Mode]</span></div>
                    <div class="sub">${lastMsg}</div>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function openChatRoom(roomId) {
        activeRoomId = roomId;
        const room = ROOMS.find(r => r.id === roomId);
        if(!room) return;

        document.getElementById('chat-room-title-text').innerText = room.roomName;
        renderMessages();
        openSubScreen('sub-chat-room');
    }

    function closeChatRoom() {
        closeSubScreen('sub-chat-room');
        activeRoomId = null;
        renderChatTab();
    }

    /* [수정 핵심] 버블 특화 프라이빗 필터링 렌더링 파트 */
    function renderMessages() {
        const container = document.getElementById('chat-msg-container');
        container.innerHTML = '';
        
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        room.messages.forEach(m => {
            // 팬 로그인 시: 아티스트 본인의 대화이거나 혹은 '나' 자신이 보낸 메시지만 타임라인에 합산 노출
            if(!currentUser.isArtist) {
                if(m.senderId !== room.artistId && m.senderId !== currentUser.id) {
                    return; // 다른 팬이 작성한 대화는 필터링 생략
                }
            }

            const row = document.createElement('div');
            // 치환 연동: @@@ 키워드를 조회자의 닉네임으로 교체
            let processedText = m.text.replace(/@@@/g, currentUser.name);

            if(m.senderId === currentUser.id) {
                row.className = 'msg-row me';
                row.innerHTML = `<div class="msg-bubble">${processedText}</div>`;
            } else {
                row.className = 'msg-row other';
                const sender = USERS.find(u => u.id === m.senderId) || { name: m.senderName || "임의팬", img: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=150" };
                row.innerHTML = `
                    <div class="profile-img" style="width:34px; height:34px; background-image:url('${sender.img}')"></div>
                    <div class="msg-other-content">
                        <div class="msg-other-top">${sender.name} <span style="font-size:10px; font-weight:normal; margin-left:4px;">${m.time}</span></div>
                        <div class="msg-bubble">${processedText}</div>
                    </div>
                `;
            }
            container.appendChild(row);
        });
        
        container.scrollTop = container.scrollHeight;
    }

    let messageSubmitLock = false;

    function sendMessage() {
        if(messageSubmitLock) return;

        const inputField = document.getElementById('chat-typing-field');
        const text = inputField.value.trim();
        if(!text) return;

        messageSubmitLock = true;

        const roomIndex = ROOMS.findIndex(r => r.id === activeRoomId);
        if(roomIndex !== -1) {
            const now = new Date();
            const timeStr = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
            
            const newMsg = {
                senderId: currentUser.id,
                senderName: currentUser.name,
                text: text,
                time: timeStr
            };

            ROOMS[roomIndex].messages.push(newMsg);
            saveData();
            renderMessages();
            inputField.value = '';
        }

        setTimeout(() => { messageSubmitLock = false; }, 100);
    }

    function triggerDummyPhoto() {
        const inputField = document.getElementById('chat-typing-field');
        inputField.value = "📷 [보안 프로필 인증 사진 발송]";
        sendMessage();
    }

    function openChatRoomSetting() {
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        document.getElementById('edit-chatroom-title').value = room.roomName;
        document.getElementById('edit-chatroom-img').value = room.img || '';

        const listContainer = document.getElementById('chatroom-member-list');
        listContainer.innerHTML = '';

        // 아티스트 채널 기준 참여 명단 시각화 가공
        room.members.forEach(mid => {
            const u = USERS.find(user => user.id === mid);
            if(!u) return;
            const row = document.createElement('div');
            row.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #f2f2f7; font-size:13px;";
            row.innerHTML = `
                <div style="display:flex; align-items:center; gap:8px;">
                    <div class="profile-img" style="width:26px; height:26px; background-image:url('${u.img}')"></div>
                    <div>${u.name} ${u.isArtist ? '⭐' : '[FAN]'}</div>
                </div>
            `;
            listContainer.appendChild(row);
        });

        openSubScreen('sub-chat-setting');
    }

    function saveChatRoomSetting() {
        const room = ROOMS.find(r => r.id === activeRoomId);
        if(!room) return;

        const newTitle = document.getElementById('edit-chatroom-title').value.trim();
        const newImg = document.getElementById('edit-chatroom-img').value.trim();

        if(!newTitle) { alert('방 이름을 입력하세요.'); return; }
        room.roomName = newTitle;
        if(newImg) room.img = newImg;

        saveData();
        alert('채팅방 정보가 저장되었습니다.');
        closeSubScreen('sub-chat-setting');
        document.getElementById('chat-room-title-text').innerText = newTitle;
    }

    function leaveChatRoom() {
        alert('아티스트 소통 전용방은 나갈 수 없습니다.');
        closeSubScreen('sub-chat-setting');
    }

    function renderOtherTab() {
        document.getElementById('other-my-img').style.backgroundImage = `url('${currentUser.img}')`;
        document.getElementById('other-my-name').innerText = currentUser.name + (currentUser.isArtist ? " (아티스트)" : " (일반 회원)");
    }

    function openSettingModal() {
        document.getElementById('set-my-name').value = currentUser.name;
        document.getElementById('set-my-status').value = currentUser.status;
        document.getElementById('set-my-img').value = currentUser.img;
        document.getElementById('set-my-bg').value = currentUser.bg;
        openSubScreen('sub-my-setting');
    }

    function saveMySetting() {
        const name = document.getElementById('set-my-name').value.trim();
        const status = document.getElementById('set-my-status').value.trim();
        const img = document.getElementById('set-my-img').value.trim();
        const bg = document.getElementById('set-my-bg').value.trim();

        if(!name) { alert('이름은 필수 항목입니다.'); return; }

        currentUser.name = name;
        currentUser.status = status;
        if(img) currentUser.img = img;
        if(bg) currentUser.bg = bg;

        const idx = USERS.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) USERS[idx] = currentUser;

        saveData();
        closeSubScreen('sub-my-setting');
        renderOtherTab();
        alert('내 프로필이 변경되었습니다.');
    }

    function openNoticeModal() {
        document.getElementById('admin-notice-form').style.display = 'none';
        renderNotices();
        openSubScreen('sub-notice');
    }

    function toggleNoticeForm() {
        const form = document.getElementById('admin-notice-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function submitNotice() {
        const title = document.getElementById('new-notice-title').value.trim();
        const content = document.getElementById('new-notice-content').value.trim();
        if(!title || !content) return;

        let notices = JSON.parse(localStorage.getItem('mood_notices')) || [];
        notices.unshift({ title, content });
        localStorage.setItem('mood_notices', JSON.stringify(notices));

        document.getElementById('new-notice-title').value = '';
        document.getElementById('new-notice-content').value = '';
        toggleNoticeForm();
        renderNotices();
    }

    function renderNotices() {
        const container = document.getElementById('notice-list-container');
        container.innerHTML = '';
        let notices = JSON.parse(localStorage.getItem('mood_notices')) || [];
        if(notices.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:20px; font-size:13px; color:var(--text-muted);">공지사항이 비어있습니다.</div>`;
            return;
        }
        notices.forEach((n, index) => {
            const item = document.createElement('div');
            item.className = 'notice-item';
            item.innerHTML = `
                <div class="notice-title-bar" onclick="toggleNoticeContent(${index})">
                    <span>📌 ${n.title}</span>
                    <span id="notice-arrow-${index}">▼</span>
                </div>
                <div class="notice-content" id="notice-content-${index}">${n.content}</div>
            `;
            container.appendChild(item);
        });
    }

    function toggleNoticeContent(idx) {
        const content = document.getElementById(`notice-content-${idx}`);
        const arrow = document.getElementById(`notice-arrow-${idx}`);
        if(content.style.display === 'block') {
            content.style.display = 'none';
            arrow.innerText = '▼';
        } else {
            content.style.display = 'block';
            arrow.innerText = '▲';
        }
    }
</script>

</body>
</html>
